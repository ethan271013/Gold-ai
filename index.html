<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoldAI - GPT אמיתי</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial; background: #0a0a0a; color: #fff; direction: rtl; }
    .gold { color: #D4AF37; }
    header { text-align: center; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 1.5rem; }
    .new-chat { background: #222; color: #D4AF37; border: 1px solid #D4AF37; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
    .chat-container { max-width: 800px; margin: 0 auto; height: calc(100vh - 150px); display: flex; flex-direction: column; }
    .chat-box { flex: 1; padding: 20px; overflow-y: auto; }
    .msg { margin-bottom: 15px; padding: 14px 18px; border-radius: 18px; max-width: 85%; line-height: 1.7; white-space: pre-wrap; }
    .user { background: #D4AF37; color: #000; margin-right: auto; }
    .assistant { background: #1a1a1a; border: 1px solid #333; margin-left: auto; }
    .input-area { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #222; }
    #userInput { flex: 1; padding: 15px 20px; background: #111; border: 1px solid #333; border-radius: 50px; color: #fff; font-size: 1rem; }
    #sendBtn { background: #D4AF37; color: #000; border: none; padding: 0 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    #sendBtn:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <header>
    <h1><span class="gold">GoldAI</span></h1>
    <button class="new-chat" onclick="newChat()">שיחה חדשה</button>
  </header>
  <div class="chat-container">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="שאל אותי הכל...">
      <button id="sendBtn">שלח</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let messages = JSON.parse(localStorage.getItem('goldai_chat')) || [];

    function newChat() {
      messages = [];
      localStorage.removeItem('goldai_chat');
      loadMessages();
    }

    function loadMessages() {
      if (messages.length === 0) messages.push({ role: 'assistant', content: 'היי 👋 אני GoldAI. אני AI אמיתי ומהיר! במה אפשר לעזור?' });
      chatBox.innerHTML = '';
      messages.forEach(m => chatBox.innerHTML += `<div class="msg ${m.role}">${m.content}</div>`);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    function saveMessages() { localStorage.setItem('goldai_chat', JSON.stringify(messages)); }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;
      messages.push({ role: 'user', content: message });
      userInput.value = '';
      sendBtn.disabled = true;
      loadMessages();
      messages.push({ role: 'assistant', content: 'חושב...' });
      loadMessages();

      try {
        const messagesToSend = messages.filter(m => m.content !== 'חושב...');

        const response = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: messagesToSend })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        messages.pop();
        messages.push({ role: 'assistant', content: data.content });
        saveMessages();
        loadMessages();
      } catch (error) {
        messages.pop();
        messages.push({ role: 'assistant', content: 'שגיאה: ' + error.message });
        loadMessages();
      }
      sendBtn.disabled = false;
    }
    sendBtn.onclick = sendMessage;
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) sendMessage(); });
    loadMessages();
  </script>
</body>
</html>
